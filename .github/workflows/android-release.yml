name: Android Release

on:
  push:
    branches:
      - main
    paths-ignore:
      - "README.md"
      - "LICENSE"
      - ".gitignore"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"

      - name: Build release APK
        run: gradle --no-daemon assembleRelease

      - name: Prepare APK
        id: package
        shell: bash
        run: |
          VERSION="$(grep -oP 'versionName\s+"\K[^"]+' app/build.gradle)"
          TAG="v${VERSION}"
          APK_NAME="CodexPanel-Android-${TAG}.apk"
          cp app/build/outputs/apk/release/app-release.apk "${APK_NAME}"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"
          echo "apk=${APK_NAME}" >> "${GITHUB_OUTPUT}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.apk }}
          path: ${{ steps.package.outputs.apk }}

      - name: Publish GitHub Release
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.package.outputs.tag }}
          APK: ${{ steps.package.outputs.apk }}
        shell: bash
        run: |
          NOTES="CodexPanel Android ${TAG}

- App 名称：CodexPanel
- 远控页面复用 CodexPanel WAN
- 配置和远控密钥仅保存在手机本机 App 私有数据中
- APK 使用调试签名，适合侧载安装和功能验证"

          if gh release view "${TAG}" >/dev/null 2>&1; then
            gh release upload "${TAG}" "${APK}" --clobber
            gh release edit "${TAG}" --title "CodexPanel Android ${TAG}" --notes "${NOTES}"
          else
            git tag "${TAG}"
            git push origin "${TAG}"
            gh release create "${TAG}" "${APK}" --title "CodexPanel Android ${TAG}" --notes "${NOTES}" --latest
          fi

